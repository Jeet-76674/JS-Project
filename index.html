<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Profile Fetcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="github-profile-fetcher.css" />
</head>
<body>
  <div class="animated-bg"></div>
  <main class="container py-5 min-vh-100 d-flex align-items-center justify-content-center">
    <section class="card glass-card shadow-lg border-0 w-100" style="max-width: 900px;">
      <div class="card-body p-4 p-md-5">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
          <div>
            <h1 class="h2 mb-1 fw-bold gradient-text">GitHub Profile Fetcher</h1>
            <p class="text-body-secondary mb-0">Search any GitHub username and get instant profile insights.</p>
          </div>
          <button id="themeToggle" class="btn btn-outline-primary rounded-pill px-4" type="button" aria-label="Toggle theme">
            🌙 Dark
          </button>
        </div>

        <form id="searchForm" class="row g-2 mb-3">
          <div class="col-12 col-md-9">
            <input id="usernameInput" class="form-control form-control-lg rounded-pill px-4" type="text" placeholder="Enter GitHub username..." required />
          </div>
          <div class="col-12 col-md-3 d-grid">
            <button class="btn btn-primary btn-lg rounded-pill" type="submit">Fetch Profile</button>
          </div>
        </form>

        <div class="suggestions mb-4">
          <p class="suggestion-title mb-2">Try searching for:</p>
          <div class="d-flex flex-wrap gap-2">
            <button type="button" class="btn btn-sm suggestion-btn" data-username="torvalds">torvalds</button>
            <button type="button" class="btn btn-sm suggestion-btn" data-username="gaearon">gaearon</button>
            <button type="button" class="btn btn-sm suggestion-btn" data-username="addyosmani">addyosmani</button>
            <button type="button" class="btn btn-sm suggestion-btn" data-username="sindresorhus">sindresorhus</button>
          </div>
        </div>

        <div id="message" class="alert d-none mb-4" role="alert"></div>

        <div id="profileCard" class="profile-card d-none p-3 p-md-4 rounded-4">
          <div class="row g-4 align-items-center">
            <div class="col-12 col-md-4 text-center">
              <img id="avatar" class="avatar shadow" src="" alt="GitHub avatar" />
            </div>
            <div class="col-12 col-md-8">
              <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                <h2 id="name" class="h3 mb-0 fw-bold"></h2>
                <a id="profileLink" class="btn btn-sm btn-outline-light rounded-pill" target="_blank" rel="noopener noreferrer">Visit Profile</a>
              </div>
              <p id="bio" class="text-body-secondary mb-3"></p>
              <div class="row g-3">
                <div class="col-6 col-lg-3">
                  <div class="stat-box">
                    <span class="stat-label">Repos</span>
                    <span id="repos" class="stat-value">0</span>
                  </div>
                </div>
                <div class="col-6 col-lg-3">
                  <div class="stat-box">
                    <span class="stat-label">Followers</span>
                    <span id="followers" class="stat-value">0</span>
                  </div>
                </div>
                <div class="col-6 col-lg-3">
                  <div class="stat-box">
                    <span class="stat-label">Following</span>
                    <span id="following" class="stat-value">0</span>
                  </div>
                </div>
                <div class="col-6 col-lg-3">
                  <div class="stat-box">
                    <span class="stat-label">Location</span>
                    <span id="location" class="stat-value stat-location">-</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="github-profile-fetcher.js"></script>
</body>
</html>
